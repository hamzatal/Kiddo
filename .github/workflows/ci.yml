name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

# Cancel in-progress runs for the same PR/branch — saves CI minutes
# when the developer pushes quickly after a failing run.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ─────────────────────────────────────────────
    # Frontend: lint + format check + unit tests + build
    # ─────────────────────────────────────────────
    frontend:
        name: Frontend (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install dependencies
              # We use `npm install` here (not `npm ci`) because the
              # lockfile has been intentionally invalidated to force a
              # clean regeneration. Once a fresh package-lock.json is
              # committed back to main, this should be switched back
              # to `npm ci` for speed and reproducibility.
              run: npm install --no-audit --no-fund

            # Lint runs without --max-warnings=0 in CI. We treat lint
            # warnings as developer signal, not as a hard failure that
            # blocks merging unrelated work. `npm run lint:strict` is
            # available locally for stricter checking.
            - name: Lint (eslint)
              run: npm run lint
              continue-on-error: true

            # Format-check is informational only. Run `npm run format`
            # locally before opening a PR to keep the diff clean.
            - name: Format check (prettier)
              run: npm run format:check
              continue-on-error: true

            - name: Unit tests (vitest)
              run: npm run test

            - name: Build (vite)
              run: npm run build

            # Persist the production build so the backend job can hit
            # the @vite() directive without rebuilding. We still set
            # withoutVite() in TestCase as a belt-and-braces guard.
            - name: Upload built assets
              if: matrix.node == '22'
              uses: actions/upload-artifact@v4
              with:
                  name: vite-build
                  path: public/build
                  retention-days: 1
                  if-no-files-found: ignore

    # ─────────────────────────────────────────────
    # Backend: composer audit + PHPUnit
    # ─────────────────────────────────────────────
    backend:
        name: Backend (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        # Wait for the frontend job so we can pull its build artifact.
        needs: frontend
        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4"]
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: mbstring, pdo, sqlite3, bcmath, intl, gd
                  coverage: none
                  tools: composer:v2

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
                  restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

            - name: Install dependencies
              run: composer install --prefer-dist --no-interaction --no-progress

            # Pull the Vite build from the frontend job. Optional:
            # if the frontend job didn't produce one (transient
            # network issue, etc.) the test suite still passes thanks
            # to TestCase::withoutVite().
            - name: Download built assets
              uses: actions/download-artifact@v4
              with:
                  name: vite-build
                  path: public/build
              continue-on-error: true

            - name: Copy env
              run: cp .env.example .env

            - name: Generate app key
              run: php artisan key:generate

            - name: Touch sqlite database
              run: |
                  mkdir -p database
                  touch database/database.sqlite

            - name: Run migrations
              run: php artisan migrate --force
              env:
                  DB_CONNECTION: sqlite
                  DB_DATABASE: database/database.sqlite

            - name: Run tests (PHPUnit)
              run: vendor/bin/phpunit
              env:
                  DB_CONNECTION: sqlite
                  DB_DATABASE: database/database.sqlite
