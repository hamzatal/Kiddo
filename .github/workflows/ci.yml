name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

# Cancel in-progress runs for the same PR/branch — saves CI minutes
# when the developer pushes quickly after a failing run.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ─────────────────────────────────────────────
    # Frontend: lint + format check + unit tests + build
    # ─────────────────────────────────────────────
    frontend:
        name: Frontend (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint (eslint)
              run: npm run lint

            - name: Format check (prettier)
              run: npm run format:check

            - name: Unit tests (vitest)
              run: npm run test

            - name: Build (vite)
              run: npm run build

    # ─────────────────────────────────────────────
    # Backend: composer audit + PHPUnit
    # ─────────────────────────────────────────────
    backend:
        name: Backend (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4"]
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: mbstring, pdo, sqlite3, bcmath, intl, gd
                  coverage: none
                  tools: composer:v2

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
                  restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

            - name: Install dependencies
              run: composer install --prefer-dist --no-interaction --no-progress

            - name: Copy env
              run: cp .env.example .env

            - name: Generate app key
              run: php artisan key:generate

            - name: Touch sqlite database
              run: |
                  mkdir -p database
                  touch database/database.sqlite

            - name: Run migrations
              run: php artisan migrate --force
              env:
                  DB_CONNECTION: sqlite

            - name: Run tests (PHPUnit)
              run: vendor/bin/phpunit
