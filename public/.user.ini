; PHP-FPM / CGI: per-directory PHP overrides for the public/ entry point.
; .htaccess covers Apache mod_php; bootstrap/app.php covers `php artisan serve`.
; This file covers nginx + PHP-FPM and Apache running in CGI mode where the
; .htaccess php_value directives are ignored.
;
; Bumped to 64M (merge #15) so base64-encoded image uploads from the
; admin UI never hit a server-side limit. Browser-side resizer keeps
; payloads under ~300 KB in practice; these are safety ceilings.
upload_max_filesize = 64M
post_max_size       = 80M
memory_limit        = 512M
max_execution_time  = 600
max_input_time      = 600
